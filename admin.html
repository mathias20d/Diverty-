<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | Diverty Eventos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #0F172A; color: #f8fafc; }
        h1, h2 { font-family: 'Nunito', sans-serif; }
        .glass-panel { background: #1E293B; border: 1px solid #334155; border-radius: 20px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, select, textarea { width: 100%; background: #0B1121; border: 1px solid #334155; color: white; border-radius: 12px; padding: 12px; margin-top: 8px; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #8b5cf6; box-shadow: 0 0 10px rgba(139,92,246,0.3); }
        .btn-pro { background: linear-gradient(90deg, #7C3AED, #E11D48); color: white; font-weight: bold; padding: 12px 24px; border-radius: 12px; cursor: pointer; transition: transform 0.2s; }
        .btn-pro:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
                <i data-lucide="settings" class="inline w-8 h-8 text-purple-400 mr-2"></i>Diverty Admin
            </h1>
            <span class="bg-emerald-500/20 text-emerald-400 px-4 py-2 rounded-full text-sm font-bold border border-emerald-500/30">Conectado a Firebase</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Formulario para Agregar/Editar -->
            <div class="lg:col-span-1 glass-panel h-fit sticky top-6">
                <h2 class="text-xl font-bold mb-4 text-purple-300">Crear / Editar Paquete</h2>
                <form id="adminForm">
                    <div class="mb-4">
                        <label class="text-xs text-slate-400 uppercase font-bold">Nombre del Paquete</label>
                        <input type="text" id="nombre" placeholder="Ej: Plan Super Magic" required>
                    </div>
                    <div class="mb-4">
                        <label class="text-xs text-slate-400 uppercase font-bold">Categoría</label>
                        <select id="categoria" required>
                            <option value="payasos">Planes de Payasos</option>
                            <option value="burbujas">Shows de Burbujas</option>
                            <option value="santa">Especial Navideño</option>
                            <option value="servicios">Otros Servicios Extras</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="text-xs text-slate-400 uppercase font-bold">Precio ($)</label>
                            <input type="number" id="precio" placeholder="Ej: 150" required>
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 uppercase font-bold">Cobro por:</label>
                            <select id="tipoCobro">
                                <option value="paquete">Precio Fijo</option>
                                <option value="hora">Por Hora</option>
                                <option value="nino">Por Niño</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4 border border-pink-500/30 bg-pink-500/10 p-4 rounded-xl">
                        <label class="flex items-center gap-2 cursor-pointer text-pink-400 font-bold mb-2">
                            <input type="checkbox" id="oferta" class="w-5 h-5 accent-pink-500">
                            ¿Es Oferta Especial?
                        </label>
                        <input type="number" id="precioOriginal" placeholder="Precio Original (Tachado)" class="hidden mt-2">
                    </div>
                    <div class="mb-4">
                        <label class="text-xs text-slate-400 uppercase font-bold">Descripción Corta</label>
                        <input type="text" id="descripcion" placeholder="Ej: Duración: 2 Horas y Media" required>
                    </div>
                    <div class="mb-4">
                        <label class="text-xs text-slate-400 uppercase font-bold">Link de la Imagen</label>
                        <input type="url" id="imagen" placeholder="https://..." required>
                    </div>
                    <div class="mb-6">
                        <label class="text-xs text-slate-400 uppercase font-bold">¿Qué incluye? (Una cosa por línea)</label>
                        <textarea id="serviciosLista" rows="5" placeholder="Payaso Profesional&#10;Juegos y Dinámicas&#10;Pintacaritas"></textarea>
                    </div>
                    <button type="submit" class="btn-pro w-full flex justify-center items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> Guardar Paquete en la Web
                    </button>
                </form>
            </div>

            <!-- Lista de Paquetes Actuales -->
            <div class="lg:col-span-2 glass-panel">
                <h2 class="text-xl font-bold mb-4 text-emerald-300 flex justify-between">
                    Catálogo Actual Web
                    <button id="refreshBtn" class="text-sm bg-slate-800 p-2 rounded-lg hover:text-white"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                </h2>
                <div id="paquetesLista" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <p class="text-slate-500 italic">Cargando paquetes...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase y Lógica -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDxE2E1KMuZU523k8oWHabi1jDrFxPOD-0", authDomain: "diverty-eventos.firebaseapp.com", projectId: "diverty-eventos", storageBucket: "diverty-eventos.firebasestorage.app", messagingSenderId: "491130670516", appId: "1:491130670516:web:8c80abd09ccc92c194f6e1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const form = document.getElementById('adminForm');
        const ofertaCheck = document.getElementById('oferta');
        const precioOriginalInput = document.getElementById('precioOriginal');
        
        ofertaCheck.addEventListener('change', (e) => {
            precioOriginalInput.classList.toggle('hidden', !e.target.checked);
        });

        async function init() {
            await signInAnonymously(auth);
            loadCatalog();
        }

        async function loadCatalog() {
            const container = document.getElementById('paquetesLista');
            container.innerHTML = '<p class="text-slate-500">Cargando...</p>';
            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', 'diverty-oficial', 'public', 'data', 'catalogo_web'));
                container.innerHTML = '';
                
                if (querySnapshot.empty) {
                    container.innerHTML = '<p class="text-slate-500">No hay paquetes dinámicos en la base de datos.</p>';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    container.innerHTML += `
                        <div class="bg-[#0F172A] border border-slate-700 p-4 rounded-xl relative group">
                            ${data.oferta ? '<span class="absolute top-2 right-2 bg-pink-600 text-[10px] font-bold px-2 py-1 rounded-full">OFERTA</span>' : ''}
                            <img src="${data.imagen || ''}" class="w-full h-24 object-cover rounded-lg mb-3 border border-slate-800">
                            <div class="text-[10px] text-purple-400 font-bold uppercase mb-1">${data.categoria}</div>
                            <h3 class="font-bold text-white leading-tight">${data.nombre}</h3>
                            <p class="text-emerald-400 font-black mt-1">$${data.precio}</p>
                            <button data-delete-id="${docSnap.id}" class="mt-3 w-full bg-rose-500/20 text-rose-400 hover:bg-rose-500 hover:text-white py-2 rounded-lg text-xs font-bold transition-colors">
                                Eliminar
                            </button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p class="text-rose-500">Error cargando paquetes.</p>';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('button');
            btn.innerHTML = 'Guardando...';
            try {
                await addDoc(collection(db, 'artifacts', 'diverty-oficial', 'public', 'data', 'catalogo_web'), {
                    nombre: document.getElementById('nombre').value,
                    categoria: document.getElementById('categoria').value,
                    precio: Number(document.getElementById('precio').value),
                    tipoCobro: document.getElementById('tipoCobro').value,
                    oferta: ofertaCheck.checked,
                    precioOriginal: ofertaCheck.checked ? Number(precioOriginalInput.value) : null,
                    descripcion: document.getElementById('descripcion').value,
                    imagen: document.getElementById('imagen').value,
                    serviciosLista: document.getElementById('serviciosLista').value,
                    creadoEn: new Date().toISOString()
                });
                alert('¡Paquete publicado en la web con éxito!');
                form.reset();
                precioOriginalInput.classList.add('hidden');
                loadCatalog();
            } catch (error) {
                console.error("Error al guardar: ", error);
                alert('Hubo un error al guardar.');
            }
            btn.innerHTML = '<i data-lucide="save" class="w-5 h-5"></i> Guardar Paquete en la Web';
            lucide.createIcons();
        });

        document.getElementById('paquetesLista').addEventListener('click', async (e) => {
            const btn = e.target.closest('[data-delete-id]');
            if(btn) {
                if(confirm('¿Seguro que deseas quitar este paquete de tu web?')) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', 'diverty-oficial', 'public', 'data', 'catalogo_web', btn.dataset.deleteId));
                        loadCatalog();
                    } catch (error) {
                        alert('Error al eliminar.');
                    }
                }
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', loadCatalog);
        lucide.createIcons();
        init();
    </script>
</body>
</html>
